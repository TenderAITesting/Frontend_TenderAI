<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tender AI — Tractebel</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F0F4F8;color:#1B2B3C;font-size:14px;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#f0f4f8}
::-webkit-scrollbar-thumb{background:#c8d5e0;border-radius:4px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadein{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-border{0%,100%{box-shadow:0 0 0 0 rgba(19,181,203,.35)}50%{box-shadow:0 0 0 5px rgba(19,181,203,0)}}
.spin{animation:spin .85s linear infinite;display:inline-block}
.fadein{animation:fadein .22s ease}

.topbar{
  background:#fff;border-bottom:1px solid #E2EBF3;height:52px;
  padding:0 24px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:500;
  box-shadow:0 1px 4px rgba(0,0,0,.04)
}
.logo{color:#13B5CB;font-weight:700;font-size:15px;letter-spacing:-.3px}
.tractebel-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;background:#003087;color:#fff;letter-spacing:.06em;flex-shrink:0}
.avatar{width:32px;height:32px;border-radius:50%;background:#13B5CB;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}

.step-banner{
  background:#fff;border-bottom:2px solid #E2EBF3;height:60px;
  padding:0 24px;display:flex;align-items:center;gap:0;
  position:sticky;top:52px;z-index:400
}
.banner-step{display:flex;align-items:center;gap:10px;padding:0 16px;height:100%;cursor:pointer;position:relative;flex-shrink:0;transition:background .15s}
.banner-step:hover{background:#F6F9FC}
.banner-step:first-child{padding-left:0}
.bs-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:#E8EDF3;color:#7E95A8;border:2px solid #D1DBE6;transition:all .2s}
.banner-step.s-done .bs-num{background:#13B5CB;color:#fff;border-color:#13B5CB}
.banner-step.s-cur .bs-num{background:#13B5CB;color:#fff;border-color:#0DA3B8;box-shadow:0 0 0 3px rgba(19,181,203,.2)}
.bs-label{font-size:12px;font-weight:500;color:#9EB0C0;white-space:nowrap;transition:color .2s}
.banner-step.s-cur .bs-label{color:#13B5CB;font-weight:700}
.banner-step.s-done .bs-label{color:#0D9DB5}
.banner-step.s-cur::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:#13B5CB}
.banner-sep{color:#D1DBE6;font-size:16px;flex-shrink:0;margin:0 2px}

.card{background:#fff;border-radius:10px;border:1px solid #E2EBF3}

.btn-cyan{background:#13B5CB;color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .15s}
.btn-cyan:hover{background:#0CA7BB}
.btn-ghost{background:#fff;border:1.5px solid #E2EBF3;border-radius:7px;padding:9px 18px;font-size:13px;font-weight:500;color:#1B2B3C;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all .15s}
.btn-ghost:hover{border-color:#13B5CB;color:#13B5CB}
.btn-outline{background:#fff;border:1.5px solid #13B5CB;border-radius:7px;padding:9px 18px;font-size:13px;font-weight:600;color:#13B5CB;display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:all .15s}
.btn-outline:hover{background:#E8F8FC}
.btn-nav{background:#fff;border:1.5px solid #E2EBF3;border-radius:7px;padding:8px 14px;font-size:13px;font-weight:500;color:#7E95A8;display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:all .15s}
.btn-nav:hover{border-color:#13B5CB;color:#13B5CB}
.btn-icon{background:none;border:1.5px solid #E2EBF3;border-radius:7px;width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:#7E95A8;transition:all .15s;font-size:15px}
.btn-icon:hover{border-color:#13B5CB;color:#13B5CB;background:#E8F8FC}

.ag-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:#E8F8FC;color:#0D9DB5;border:1px solid #B0E8F2;white-space:nowrap}
.status-btn{font-size:11px;font-weight:600;padding:4px 14px;border-radius:20px;background:#13B5CB;color:#fff;border:none;cursor:pointer;transition:background .15s}
.status-btn:hover{background:#0CA7BB}

.data-table{width:100%;border-collapse:collapse}
.data-table th{text-align:left;padding:11px 16px;border-bottom:2px solid #E2EBF3;font-size:11px;font-weight:700;color:#7E95A8;letter-spacing:.07em;background:#F8FAFC;white-space:nowrap}
.data-table td{padding:12px 16px;border-bottom:1px solid #EAEFF5;font-size:13px;vertical-align:middle}
.data-table tbody tr:hover td{background:#F4F9FC}
.data-table tbody tr:last-child td{border-bottom:none}

.mx-table{width:100%;border-collapse:collapse}
.mx-table th{padding:11px 14px;font-size:11px;font-weight:700;color:#0D9DB5;letter-spacing:.04em;background:#F0FBFD;border-bottom:1.5px solid #B0E8F2;text-align:center;vertical-align:middle}
.mx-table th:first-child{text-align:left;color:#7E95A8;background:#F8FAFC;border-bottom:1.5px solid #E2EBF3}
.mx-table th .ag-head-wrap{display:flex;align-items:center;justify-content:center;gap:7px}
.mx-table th .ag-tick{width:16px;height:16px;border-radius:3px;background:#13B5CB;display:inline-flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;flex-shrink:0}
.mx-table td{padding:12px 14px;border-bottom:1px solid #EAEFF5;font-size:13px;text-align:center;vertical-align:middle}
.mx-table td:first-child{text-align:left}
.mx-table tbody tr:hover td{background:#F4F9FC}
.mx-table tbody tr:last-child td{border-bottom:none}
.cb{width:18px;height:18px;cursor:pointer;accent-color:#13B5CB;border-radius:4px}

.inp{width:100%;border:1.5px solid #E2EBF3;border-radius:7px;padding:10px 13px;font-size:13px;color:#1B2B3C;background:#fff;outline:none;transition:border-color .2s}
.inp:focus{border-color:#13B5CB;box-shadow:0 0 0 3px rgba(19,181,203,.1)}
.inp-label{font-size:11px;font-weight:700;color:#7E95A8;letter-spacing:.06em;margin-bottom:5px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;z-index:700}
.modal-box{background:#fff;border-radius:12px;width:93%;max-width:860px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.24);animation:fadein .2s ease}
.modal-tab-btn{padding:10px 0;margin-right:20px;font-size:12px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;color:#7E95A8;white-space:nowrap;font-weight:400;transition:color .15s}
.modal-tab-btn.active{font-weight:700;color:#13B5CB;border-bottom-color:#13B5CB}

.warn-box{background:#FEF8ED;border:1px solid #F5A623;border-radius:8px;padding:11px 16px;display:flex;gap:10px;align-items:flex-start}
.upload-warn{background:#FFF3CD;border:1.5px solid #F5A623;border-radius:8px;padding:11px 15px;display:flex;gap:10px;align-items:flex-start;margin-bottom:18px}
.info-box{background:#EEF8FF;border:1px solid #93C5FD;border-radius:8px;padding:10px 14px;display:flex;gap:8px;font-size:12px;color:#1D4ED8}
.retention-bar{background:#FEF8ED;border-top:1.5px solid #F5A623;padding:10px 24px;display:flex;align-items:center;gap:10px;font-size:12px;color:#8A5A00;flex-shrink:0}

.prop-nav{width:216px;background:#fff;border-right:1px solid #E2EBF3;padding:14px 0;overflow-y:auto;flex-shrink:0}
.nav-item{padding:8px 14px;font-size:12px;cursor:pointer;border-left:3px solid transparent;transition:background .12s;color:#1B2B3C;display:flex;align-items:center;gap:6px}
.nav-item.sub{padding-left:28px;font-size:11.5px;color:#4A6070}
.nav-item:hover{background:#EEF3F8}
.nav-item.active{background:#E8F8FC;color:#0D9DB5;font-weight:600;border-left-color:#13B5CB}

.bottom-bar{background:#fff;border-top:1px solid #E2EBF3;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}

.elapsed-inline{display:inline-flex;align-items:center;gap:6px;background:#FEF8ED;border:1px solid #F5A623;border-radius:6px;padding:4px 10px;font-size:11px;color:#8A5A00;font-weight:600;margin-top:8px}

.disc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:800}
.disc-box{background:#fff;border-radius:12px;width:92%;max-width:460px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.22);animation:fadein .18s ease}

.lang-wrap{display:flex;align-items:center;gap:8px;background:#F5F8FB;border:1px solid #E2EBF3;border-radius:7px;padding:5px 10px}
.lang-label{font-size:11px;color:#7E95A8;font-weight:600;letter-spacing:.04em;white-space:nowrap}
.lang-sel{border:none;background:transparent;font-size:12px;font-weight:700;color:#13B5CB;cursor:pointer;outline:none;padding:0 2px;font-family:inherit}

.paa-doc-header{background:#F0FBFD;border:1px solid #B0E8F2;border-radius:7px;padding:8px 14px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#0D9DB5}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/7.8.2/docx.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="app"></div>
<script>

const USER = { first:'Romain', last:'DEL FABRO', initials:'RD' };
const LANGS = ['EN','FR','NL','DE','ES','PT'];

const S = {
  view: 'dashboard',
  lang: 'EN',
  tenderStep: 'upload',
  isNew: true,
  currentTender: null,
  currentMaxStepIdx: 0,
  processing: false,
  elapsed: 0,
  showResults: false,
  resultsAgent: 'a1',
  resultsTab: 'keyinfo',
  showDisclaimer: null,
  showSrcPage: null,
  showExportModal: false,
  exportLang: null,
  exporting: false,
  showUpdateDocs: false,
  docsUpdated: false,
  activeSection: '1.0',
  templateType: 'standard',
  enrichedOpts: { context:false, offers:false, refs:false },
  docs: [
    {key:'doc1', name:'RFP_Section_A_Technical_Scope.pdf', size:'12.4 MB', ago:'2h ago'},
    {key:'doc2', name:'Draft_Contract_Agreement.docx',      size:'2.1 MB',  ago:'2h ago'},
  ],
  docAgents: {
    doc1:{ a1:true,  a2:true,  a3:false },
    doc2:{ a1:false, a2:false, a3:true  },
  },
  newForm:{ name:'', client:'', lastName:USER.last, firstName:USER.first },
  contactOpen: true,
  tenders:[
    {name:'CEA UP1 - simplification MA', client:'CEA',        responsible:'Romain DEL FABRO', modified:'23/03/2026', maxStepIdx:1, lastStep:'agents'},
    {name:'Navigator',                   client:'Navigator',  responsible:'Romain DEL FABRO', modified:'23/03/2026', maxStepIdx:1, lastStep:'agents'},
    {name:'test',                        client:'sellafield', responsible:'Romain DEL FABRO', modified:'11/03/2026', maxStepIdx:1, lastStep:'agents'},
    {name:'CISF waste building',         client:'NRWDI',      responsible:'Romain DEL FABRO', modified:'11/02/2026', maxStepIdx:1, lastStep:'agents'},
    {name:'ANDRA MS4',                   client:'ANDRA',      responsible:'Romain DEL FABRO', modified:'06/02/2026', maxStepIdx:1, lastStep:'agents'},
    {name:'test',                        client:'Iter',       responsible:'Romain DEL FABRO', modified:'04/02/2026', maxStepIdx:1, lastStep:'agents'},
    {name:'sdfsdf',                      client:'Sener',      responsible:'Romain DEL FABRO', modified:'28/01/2026', maxStepIdx:1, lastStep:'agents'},
    {name:'TAQA Test 2',                 client:'TAQA',       responsible:'Romain DEL FABRO', modified:'15/12/2025', maxStepIdx:1, lastStep:'agents'},
    {name:'FluxysZ4',                    client:'Fluxys',     responsible:'Romain DEL FABRO', modified:'04/12/2025', maxStepIdx:1, lastStep:'agents'},
    {name:'Test',                        client:'EDF',        responsible:'Romain DEL FABRO', modified:'04/12/2025', maxStepIdx:1, lastStep:'agents'},
  ],
};

let _elTimer = null;

function set(patch){
  Object.assign(S, typeof patch==='function'?patch(S):patch);
  if(S.processing && !_elTimer){
    _elTimer = setInterval(()=>{
      S.elapsed++;
      const el = document.getElementById('elapsed-a3');
      if(el) el.textContent = fmtTime(S.elapsed);
    }, 1000);
  }
  if(!S.processing && _elTimer){ clearInterval(_elTimer); _elTimer=null; }
  document.getElementById('app').innerHTML = buildApp();
  if(S.showSrcPage){
    var pg = parseInt((S.showSrcPage||'p.1').replace('p.',''));
    var container = document.getElementById('src-scroll');
    var target = document.getElementById('src-page-'+pg);
    if(container && target) container.scrollTop = target.offsetTop;
  }
}

function fmtTime(s){
  return [Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(v=>String(v).padStart(2,'0')).join(':');
}


window.setLang = l => set({lang:l});

function _saveTenderProgress(s) {
  if (s.currentTender === null || s.view !== 'tender') return null;
  const tenders = [...s.tenders];
  tenders[s.currentTender] = {
    ...tenders[s.currentTender],
    lastStep:   s.tenderStep,
    maxStepIdx: s.currentMaxStepIdx,
  };
  return tenders;
}

window.goView = v => set(s => {
  const tenders = _saveTenderProgress(s);
  return tenders ? { view:v, tenders } : { view:v };
});

window.goNew = () => set(s => {
  const tenders = _saveTenderProgress(s);
  const patch = { view:'new_project', newForm:{name:'',client:'',lastName:USER.last,firstName:USER.first} };
  if (tenders) patch.tenders = tenders;
  return patch;
});

const DEFAULT_DOCS = [
  {key:'doc1', name:'RFP_Section_A_Technical_Scope.pdf', size:'12.4 MB', ago:'2h ago'},
  {key:'doc2', name:'Draft_Contract_Agreement.docx',      size:'2.1 MB',  ago:'2h ago'},
];
const DEFAULT_DOC_AGENTS = {
  doc1:{ a1:true,  a2:true,  a3:false },
  doc2:{ a1:false, a2:false, a3:true  },
};

window.openTender = idx => {
  const updatedTenders = _saveTenderProgress(S) || S.tenders;
  const t = updatedTenders[idx];
  const maxStepIdx = t.maxStepIdx !== undefined ? t.maxStepIdx : 1;
  const lastStep   = t.lastStep   || 'agents';
  set({
    view:'tender', currentTender:idx, isNew:false,
    tenderStep: lastStep,
    currentMaxStepIdx: maxStepIdx,
    tenders: updatedTenders,
    processing:false, elapsed:0, docsUpdated:false,
    docs: DEFAULT_DOCS.map(d=>({...d})),
    docAgents: { doc1:{...DEFAULT_DOC_AGENTS.doc1}, doc2:{...DEFAULT_DOC_AGENTS.doc2} },
  });
};

window.submitNew = () => {
  const t = { name:S.newForm.name||'New Tender', client:S.newForm.client||'—', responsible:USER.first+' '+USER.last, modified:new Date().toLocaleDateString('fr-FR'), maxStepIdx:0, lastStep:'upload' };
  set(s=>({tenders:[t,...s.tenders], view:'tender', currentTender:0, isNew:true, tenderStep:'upload',
    currentMaxStepIdx:0, processing:false, elapsed:0, docsUpdated:false,
    docs: DEFAULT_DOCS.map(d=>({...d})),
    docAgents: { doc1:{...DEFAULT_DOC_AGENTS.doc1}, doc2:{...DEFAULT_DOC_AGENTS.doc2} },
  }));
};
window.goStep = step => {
  const steps  = ['upload','agents','planning','drafting'];
  const cur    = steps.indexOf(S.tenderStep);
  const target = steps.indexOf(step);
  if (S.isNew  && target > cur)                 return; 
  if (!S.isNew && target > S.currentMaxStepIdx) return; 
  set({ tenderStep:step });
};
window.startProc = () => set(s => ({
  processing:true, tenderStep:'agents', docsUpdated:false,
  currentMaxStepIdx: Math.max(s.currentMaxStepIdx, 1),
}));
window.openRes       = (agId) => set({showResults:true, resultsAgent:agId||'a1', resultsTab:'keyinfo'});
window.closeRes      = ()   => set({showResults:false});
window.setResTab     = t    => set({resultsTab:t});
window.togDA         = (d,a)=> set(s=>{
  if(a==='a3'){
    const hasA1orA2 = s.docs.some(doc => s.docAgents[doc.key]?.a1 || s.docAgents[doc.key]?.a2);
    if(!hasA1orA2) return s;
  }
  const x={...s.docAgents}; x[d]={...x[d]}; x[d][a]=!x[d][a]; return{docAgents:x};
});
window.togContact    = ()   => set({contactOpen:!S.contactOpen});
window.openSrc       = pg  => set({showSrcPage: pg});
window.closeSrc      = ()  => set({showSrcPage: null});
window.stopOv        = e   => e.stopPropagation();
window.setSection    = id  => set({activeSection:id});
window.setTemplate   = t   => set({templateType:t});
window.togEnriched   = k   => set(s=>{ const o={...s.enrichedOpts}; o[k]=!o[k]; return{enrichedOpts:o}; });
window.openExport    = ()   => set({showExportModal:true, exportLang:null});
window.closeExport   = ()   => set({showExportModal:false});
window.setExportLang = l    => {
  S.exportLang = l;
  document.querySelectorAll('[data-lang-btn]').forEach(btn => {
    const code = btn.getAttribute('data-lang-btn');
    const sel = code === l;
    btn.style.borderColor = sel ? '#13B5CB' : '#E2EBF3';
    btn.style.background  = sel ? '#E8F8FC' : '#fff';
    btn.style.color       = sel ? '#0D9DB5' : '#1B2B3C';
    btn.style.fontWeight  = sel ? '700' : '400';
    btn.querySelector('.lang-check').style.display = sel ? 'inline' : 'none';
  });
  const exportBtn = document.getElementById('export-confirm-btn');
  if(exportBtn){ exportBtn.disabled=false; exportBtn.style.opacity='1'; exportBtn.style.cursor='pointer'; }
};
window.confirmExport = async () => {
  set({showExportModal:false, exporting:true});
  try {
    const { Document, Paragraph, TextRun, HeadingLevel, Packer, AlignmentType, BorderStyle, ShadingType } = docx;
    const tender = S.tenders[S.currentTender] || {name:'Technical Proposal', client:'—'};

    function htmlToParas(htmlStr) {
      const wrap = window.document.createElement('div');
      wrap.innerHTML = htmlStr;
      const paras = [];
      wrap.querySelectorAll('p, li').forEach(el => {
        const runs = [];
        el.childNodes.forEach(node => {
          if (node.nodeType === Node.TEXT_NODE) {
            if (node.textContent) runs.push(new TextRun({text: node.textContent}));
          } else if (node.nodeName === 'STRONG') {
            runs.push(new TextRun({text: node.textContent, bold: true}));
          } else if (node.nodeName === 'SPAN') {
            const isPlaceholder = node.style.background && node.style.background.includes('254');
            runs.push(new TextRun({
              text: node.textContent,
              bold: isPlaceholder,
              color: isPlaceholder ? '92400E' : '000000',
              italics: isPlaceholder,
            }));
          } else if (node.textContent) {
            runs.push(new TextRun({text: node.textContent}));
          }
        });
        if (runs.length) paras.push(new Paragraph({children: runs, spacing:{after:160}}));
      });
      return paras.length ? paras : [new Paragraph({
        children:[new TextRun({text:'[PLACEHOLDER — section à compléter]', italics:true, color:'92400E'})],
        spacing:{after:160}
      })];
    }

    const children = [];

    children.push(new Paragraph({
      children:[new TextRun({text:'TRACTEBEL ENGINEERING', bold:true, size:20, color:'003087', allCaps:true})],
      alignment: AlignmentType.CENTER, spacing:{after:80}
    }));
    children.push(new Paragraph({
      children:[new TextRun({text:'Technical Proposal', bold:true, size:56})],
      alignment: AlignmentType.CENTER, spacing:{after:120}
    }));
    children.push(new Paragraph({
      children:[new TextRun({text: tender.name + '  ·  ' + tender.client, size:24, color:'4A6070'})],
      alignment: AlignmentType.CENTER, spacing:{after:80}
    }));
    children.push(new Paragraph({
      children:[new TextRun({text:'Draft v0.1  ·  ' + new Date().toLocaleDateString('fr-FR'), size:20, color:'9EB0C0'})],
      alignment: AlignmentType.CENTER, spacing:{after:600}
    }));
    children.push(new Paragraph({
      children:[new TextRun({text:'Confidentiel — Usage interne', italics:true, color:'9EB0C0', size:18})],
      alignment: AlignmentType.CENTER, spacing:{after:0}
    }));
    children.push(new Paragraph({pageBreakBefore: true, children:[new TextRun({text:''})]}));

    NAV_SECS.forEach(sec => {
      const draft = DRAFT_SECS[sec.id];
      children.push(new Paragraph({
        text: sec.id + '  —  ' + sec.label,
        heading: sec.sub ? HeadingLevel.HEADING_2 : HeadingLevel.HEADING_1,
        spacing:{before: sec.sub ? 200 : 400, after:160},
      }));
      if (draft) {
        htmlToParas(draft.body()).forEach(p => children.push(p));
      } else {
        children.push(new Paragraph({
          children:[new TextRun({text:'[PLACEHOLDER — section à compléter]', italics:true, color:'92400E'})],
          spacing:{after:160}
        }));
      }
    });

    children.push(new Paragraph({spacing:{before:600}, children:[new TextRun({text:''})]}));
    children.push(new Paragraph({
      children:[new TextRun({text:'Généré par Tender AI — ' + new Date().toLocaleDateString('fr-FR'), size:16, color:'CBD5E0', italics:true})],
      alignment: AlignmentType.CENTER
    }));

    const proposal = new Document({
      styles:{
        default:{
          heading1:{run:{bold:true, size:28, color:'003087'}, paragraph:{spacing:{before:400,after:160}}},
          heading2:{run:{bold:true, size:22, color:'0D9DB5'}, paragraph:{spacing:{before:200,after:120}}},
          document:{run:{size:24, font:'Calibri'}},
        }
      },
      sections:[{
        properties:{},
        children
      }]
    });

    const blob = await Packer.toBlob(proposal);
    const url  = URL.createObjectURL(blob);
    const link = window.document.createElement('a');
    link.href  = url;
    link.download = (tender.name||'proposal').replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'_') + '_draft_v0.1.docx';
    window.document.body.appendChild(link);
    link.click();
    window.document.body.removeChild(link);
    URL.revokeObjectURL(url);
    set({exporting:false});
  } catch(err) {
    console.error('Export error:', err);
    set({exporting:false});
  }
};

function tenderView(){
  const steps  = ['upload','agents','planning','drafting'];
  const labels = ['Upload Tender','Agents & Validation','Proposal Planning','Proposal Drafting'];
  const cur    = steps.indexOf(S.tenderStep);
  const maxIdx = S.currentMaxStepIdx;
  const banner = `<div class="step-banner" style="justify-content:space-between">${steps.map((s,i)=>{
    const isCur   = i===cur;
    const isDone  = S.isNew ? i<cur : (i<=maxIdx && !isCur);
    const blocked = S.isNew ? i>cur : i>maxIdx;
    const numBg    = !S.isNew ? (isCur ? '#0A7A8E' : isDone ? '#7DD4E2' : '#E8EDF3')
                               : (isDone ? '#13B5CB' : isCur ? '#13B5CB' : '#E8EDF3');
    const numBd    = !S.isNew ? (isCur ? '#0A7A8E' : isDone ? '#7DD4E2' : '#D1DBE6')
                               : (isDone ? '#13B5CB' : isCur ? '#0DA3B8' : '#D1DBE6');
    const numColor = (isDone||isCur) ? '#fff' : '#7E95A8';
    const lblColor = !S.isNew ? (isCur ? '#0A7A8E' : isDone ? '#8EC8D5' : '#9EB0C0')
                               : (isCur ? '#13B5CB' : isDone ? '#0D9DB5' : '#9EB0C0');
    const lblDeco  = !S.isNew && isCur ? 'text-decoration:underline;text-underline-offset:3px;' : '';
    return `<div class="banner-step" style="flex:1;justify-content:center;cursor:${blocked?'default':'pointer'};opacity:${blocked?'0.38':'1'}" onclick="${blocked?'void(0)':`goStep('${s}')`}"><div class="bs-num" style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:${numBg};color:${numColor};border:2px solid ${numBd};${isCur?'box-shadow:0 0 0 3px rgba(19,181,203,.2)':''}">${isDone&&!isCur?'✓':i+1}</div><div class="bs-label" style="color:${lblColor};font-weight:${isCur?'700':'500'};${lblDeco}">${labels[i]}</div></div>${i<3?`<div class="banner-sep" style="flex:0 0 auto">›</div>`:''}`;
  }).join('')}</div>`;
  let content = '';
  if(S.tenderStep==='upload')        content = uploadTab();
  else if(S.tenderStep==='agents')   content = agentsTab();
  else if(S.tenderStep==='planning') content = planningView();

}

const DOC_PAGES = [

  { n:2,  content:`<p>Le présent marché est conclu entre le <strong>COMMISSARIAT À L'ÉNERGIE ATOMIQUE ET AUX ÉNERGIES ALTERNATIVES (CEA)</strong>, établissement public à caractère industriel et commercial, représenté par son Administrateur Général, dont le siège social est situé au 25 rue Leblanc, 75015 Paris, ci-après dénommé « le Pouvoir Adjudicateur ».</p><br><p>Le titulaire du présent marché est une société spécialisée dans les études de sûreté nucléaire, sélectionnée à l'issue de la procédure d'appel d'offres restreint.</p>` },
  { n:3,  content:`<p style="font-weight:600;margin-bottom:10px">Article 1 — Objet du marché</p><p>Le présent marché a pour objet la réalisation d'études et de dossiers de sûreté dans le cadre de la simplification de la ventilation des locaux MA sur le site UP1 de Marcoule. Les prestations comprennent l'analyse des installations existantes, la proposition de solutions de simplification, et la rédaction des dossiers réglementaires associés.</p>` },
  { n:4,  content:`<p style="font-weight:600;margin-bottom:10px">Article 2 — Calendrier</p><p>La date limite de remise des offres est fixée au <strong>15 avril 2024 à 17h00 (heure de Paris)</strong>. Tout dossier reçu après cette date et heure ne sera pas examiné. Les candidats sont invités à soumettre leur offre par voie électronique via le portail dédié.</p><br><p>Calendrier prévisionnel :</p><ul style="margin-left:18px;margin-top:8px;line-height:2"><li>Lancement AO : 01/03/2024</li><li>Date limite Q&A : 22/03/2024</li><li>Remise des offres : 15/04/2024</li><li>Notification du marché : 10/05/2024</li></ul>` },
  { n:5,  content:`<p style="font-weight:600;margin-bottom:10px">Article 3 — Contenu de l'offre</p><p>Les candidats devront fournir un dossier complet comprenant : une note méthodologique détaillant l'approche technique proposée, un planning de réalisation avec jalons, les CV des intervenants clés, et une proposition financière détaillée.</p>` },
  { n:6,  content:`<p style="font-weight:600;margin-bottom:10px">Article 4 — Durée du marché</p><p>La durée du marché est fixée à <strong>18 mois à compter de la notification</strong>, avec possibilité de prolongation de 6 mois sur décision du Pouvoir Adjudicateur. Toute modification de délai fera l'objet d'un avenant signé par les deux parties.</p>` },
  { n:7,  content:`<p style="font-weight:600;margin-bottom:10px">Article 5 — Confidentialité</p><p>Un accord de confidentialité (NDA) est requis avant toute communication d'informations sensibles relatives au projet. Ce document doit être signé et renvoyé au Pouvoir Adjudicateur <strong>avant la soumission de l'offre</strong>. Toute divulgation non autorisée entraînera la disqualification du candidat.</p>` },

  { n:14, content:`<p style="font-weight:600;margin-bottom:10px">Article 12 — Retenue de garantie</p><p>Une retenue de garantie de <strong>5% du montant des prestations</strong> sera prélevée sur chaque acompte. Cette retenue sera libérée à la réception définitive des prestations, après vérification de la conformité des livrables avec les spécifications contractuelles.</p>` },

  { n:16, content:`<p style="font-weight:600;margin-bottom:10px">Article 14 — Résiliation pour convenance</p><p>Le Pouvoir Adjudicateur se réserve le droit de résilier le marché pour convenance, moyennant un préavis de <strong>30 jours calendaires</strong> notifié au titulaire par lettre recommandée avec avis de réception. Dans ce cas, le titulaire a droit à l'indemnisation des prestations réalisées et des frais engagés.</p>` },

    '5':   { desc:'Outline key personnel, roles, organizational chart, and team credentials. Our team includes [Name][Role], [Credential]. An org chart is provided on page 24…' },
    '6':   { desc:'Detail the project milestone plan, key deliverables, and key assumptions where regarding to the RFP. Proposed pricing is outlined below, with terms and conditions, including…' },
    '7':   { desc:'Detail pricing, any terms and conditions, and payment milestones according to the RFP. Proposed pricing is outlined below, with terms and conditions. Payments will be milestone based, including…' },
  };

  const rows = toc.map(r=>{
    const det = TOC_DETAILS[r.n] || {};
    return `
  <tr onmouseover="this.style.background='#F4F9FC'" onmouseout="this.style.background=''">
    <td style="padding:10px 12px;border-bottom:1px solid #EAEFF5;font-size:11px;color:#9EB0C0;font-family:'DM Mono',monospace;padding-left:${r.sub?'28':'12'}px;vertical-align:top;width:44px">${r.n}</td>
    <td style="padding:10px 12px;border-bottom:1px solid #EAEFF5;padding-left:${r.sub?'28':'12'}px">
      <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:${det.desc?'4':'0'}px">
        <span style="font-size:13px;font-weight:${r.sub?'500':'700'}">${r.label}</span>
        ${r.warn?`<span style="font-size:10px;background:#FEF8ED;color:#8A5A00;border:1px solid #F5A623;padding:2px 8px;border-radius:4px;white-space:nowrap">⚠ No past offer loaded</span>`:''}
        ${det.desc?`<span style="font-size:11px;color:#9EB0C0;font-style:italic">${det.desc.length>80?det.desc.slice(0,80)+'…':det.desc}</span>`:''}
      </div>
      ${det.guide?`<div style="font-size:11px;color:#7E95A8;margin-bottom:4px"><strong>Writing Guidelines</strong> <span style="color:#9EB0C0">${det.guide.length>90?det.guide.slice(0,90)+'…':det.guide}</span></div>`:''}
      ${det.example?`<div style="font-size:11px;color:#9EB0C0;margin-bottom:4px"><strong style="color:#7E95A8">Content Example:</strong> ${det.example.length>100?det.example.slice(0,100)+'…':det.example} <span style="color:#13B5CB;cursor:pointer">Review & Edit ›</span></div>`:''}
      ${det.note?`<div style="font-size:10px;color:#8A5A00;background:#FEF8ED;border:1px solid #F5A623;border-radius:5px;padding:3px 8px;display:inline-block;margin-top:2px">⚠ ${det.note}</div>`:''}
    </td>
    <td style="padding:10px 12px;border-bottom:1px solid #EAEFF5;text-align:right;font-size:12px;color:#9EB0C0;font-family:'DM Mono',monospace;vertical-align:top">${r.pages||'—'}</td>
    <td style="padding:10px 12px;border-bottom:1px solid #EAEFF5;text-align:right;vertical-align:top">
      <button class="btn-cyan" style="font-size:11px;padding:5px 12px;white-space:nowrap">Edit Section</button>
    </td>
  </tr>`}).join('');

  const navItems = NAV_SECS.map(s=>`
  <div class="nav-item ${s.sub?'sub':''} ${S.activeSection===s.id?'active':''}" onclick="setSection('${s.id}')">
    <span style="font-size:9px;color:#CBD5E0">⠿</span>${s.id} ${s.label}
  </div>`).join('');

  return `
  <div style="display:flex;min-height:calc(100vh - 112px)">
    <div class="prop-nav">
      <div style="padding:0 14px 10px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;font-weight:700">Proposal Structure</span>
        <span style="font-size:11px;color:#13B5CB;cursor:pointer;font-weight:600">+ Add</span>
      </div>
      ${navItems}
      <div style="padding:10px 14px">
        <div style="font-size:11px;color:#9EB0C0;text-align:center;cursor:pointer;padding:8px;border:1.5px dashed #E2EBF3;border-radius:6px"
          onmouseover="this.style.borderColor='#13B5CB'" onmouseout="this.style.borderColor='#E2EBF3'">+ New Main Section</div>
      </div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div style="flex:1;overflow-y:auto;padding:22px 28px">
        <div class="warn-box" style="margin-bottom:20px">
          <span style="color:#F5A623;font-size:16px;flex-shrink:0">⚠</span>
          <div style="font-size:13px;line-height:1.6">
            <strong>Your validation is required.</strong> The proposal will not proceed to drafting until you confirm this Table of Contents. You can edit section titles or add new sections before freezing.
            <div style="margin-top:4px;font-size:12px;color:#8A5A00">Template: <strong>${S.templateType==='enriched'?'Enriched':'Standard'} ToC</strong></div>
          </div>
        </div>
        <div class="card" style="overflow:hidden">
          <table style="width:100%;border-collapse:collapse">
            <thead>
              <tr style="background:#F8FAFC">
                <th style="text-align:left;padding:9px 12px;border-bottom:1.5px solid #E2EBF3;font-size:11px;font-weight:700;color:#7E95A8;letter-spacing:.06em;width:50px">#</th>
                <th style="text-align:left;padding:9px 12px;border-bottom:1.5px solid #E2EBF3;font-size:11px;font-weight:700;color:#7E95A8;letter-spacing:.06em">SECTION TITLE</th>
                <th style="text-align:right;padding:9px 12px;border-bottom:1.5px solid #E2EBF3;font-size:11px;font-weight:700;color:#7E95A8;letter-spacing:.06em;width:90px">EST. PAGES</th>
                <th style="text-align:right;padding:9px 12px;border-bottom:1.5px solid #E2EBF3;font-size:11px;font-weight:700;color:#7E95A8;letter-spacing:.06em;width:120px">ACTION</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
      <div class="bottom-bar">
        <button onclick="goStep('agents')" class="btn-ghost" style="font-size:12px">← Agents & Validation</button>
        <div style="display:flex;gap:10px;align-items:center">
          <button class="btn-ghost" style="font-size:12px">✎ Edit Structure</button>
          <button class="btn-cyan" onclick="freezeAndDraft()">Freeze Golden ToC & Draft the Proposal →</button>
        </div>
      </div>
    </div>
  </div>`;
}

function phInline(t){
  return `<span style="background:#FEF3C7;color:#92400E;font-style:italic;padding:1px 7px;border-radius:4px;font-size:.875em;border:1px solid #FCD34D">[${t}]</span>`;
}

const DRAFT_SECS = {
  '1.0':{title:'Executive Summary',body:()=>`
    <p style="font-size:14px;line-height:1.9;margin-bottom:16px">This proposal is submitted by <strong>Tractebel Engineering</strong> in response to the Request for Proposal issued by Tractebel Global for the Offshore Wind Farm — North Sea Phase IV project (Ref. PLW-2024-0892-NW).</p>
    <p style="font-size:14px;line-height:1.9;margin-bottom:16px">Tractebel Engineering brings over 30 years of offshore infrastructure expertise. Our team of ${phInline('team size')} specialists will be mobilised within ${phInline('mobilisation timeline')} of contract award.</p>
    <p style="font-size:14px;line-height:1.9">We are confident our technical approach, organisational structure, and track record uniquely position us to deliver this project on schedule and within budget.</p>`
  },
  '3.0':{title:'Technical Approach & Methodology',body:()=>`
    <p style="font-size:14px;line-height:1.9;margin-bottom:16px">Our proposed deployment prioritizes local expertise combined with global oversight. The project will be structured across ${phInline('number of phases')} distinct phases, with a dedicated steering committee ensuring that all sustainability milestones are met within the ${phInline('equipment type')} framework.</p>
    <p style="font-size:14px;line-height:1.9;margin-bottom:16px">Key personnel will include a Lead Civil Engineer with over 15 years of experience. The allocation of heavy machinery, specifically the ${phInline('machinery spec')}, follows the phased rollout schedule agreed upon during pre-qualification.</p>
    <p style="font-size:14px;line-height:1.9">Our mobilisation approach draws on previous deployments in comparable environments, minimising on-site learning curves and ensuring continuity between project phases.</p>`
  },
};

const FALLBACK_SEC = {
  title:'Section Content',
  body:()=>`<p style="font-size:14px;line-height:1.9;color:#7E95A8;font-style:italic">This section is being drafted by Agent 5. Content will appear here shortly.</p>`
};

function draftingView(){
  const sec     = DRAFT_SECS[S.activeSection] || FALLBACK_SEC;
  const secLabel= NAV_SECS.find(n=>n.id===S.activeSection)?.label || sec.title;
  const navItems = NAV_SECS.map(s=>`
  <div class="nav-item ${s.sub?'sub':''} ${S.activeSection===s.id?'active':''}" onclick="setSection('${s.id}')">
    <span style="font-size:9px;color:#CBD5E0">⠿</span>${s.id} ${s.label}
    ${DRAFT_SECS[s.id]?`<span style="margin-left:auto;width:6px;height:6px;background:#13B5CB;border-radius:50%;flex-shrink:0"></span>`:''}
  </div>`).join('');

  return `
  <div style="display:flex;min-height:calc(100vh - 112px)">
    <div class="prop-nav">
      <div style="padding:0 14px 5px;font-size:12px;font-weight:700">Proposal Sections</div>
      <div style="padding:0 14px 9px;font-size:10px;color:#9EB0C0;display:flex;align-items:center;gap:5px">
        <span style="width:6px;height:6px;background:#13B5CB;border-radius:50%;display:inline-block"></span> = drafted
      </div>
      ${navItems}
    </div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div style="flex:1;overflow-y:auto">
        <div style="padding:36px 56px;max-width:800px;margin:0 auto">
          <div style="text-align:center;margin-bottom:32px;padding-bottom:24px;border-bottom:2px solid #E2EBF3">
            <div style="font-size:10px;letter-spacing:.16em;color:#9EB0C0;margin-bottom:8px;font-weight:700">TRACTEBEL ENGINEERING — CONFIDENTIAL</div>
            <h1 style="font-size:28px;font-weight:700;margin-bottom:6px;letter-spacing:-.5px">Technical Proposal</h1>
            <div style="font-size:13px;color:#9EB0C0">Ref. PLW-2024-0892-NW &nbsp;·&nbsp; April 2026 &nbsp;·&nbsp; Draft v0.1</div>
          </div>
          <div style="font-size:10px;color:#13B5CB;font-weight:700;letter-spacing:.1em;margin-bottom:8px">${S.activeSection} — ${secLabel.toUpperCase()}</div>
          <h2 style="font-size:22px;font-weight:700;margin-bottom:22px;letter-spacing:-.3px">${sec.title}</h2>
          ${sec.body()}
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#CBD5E0;border-top:1px solid #E2EBF3;padding-top:14px;margin-top:48px;font-family:'DM Mono',monospace">
            <span>Generated by Tender AI · April 2026</span>
            <span>Confidential — Draft v0.1</span>
          </div>
        </div>
      </div>
      <div class="bottom-bar">
        <button onclick="goStep('planning')" class="btn-ghost" style="font-size:12px">← Proposal Planning</button>
        <div style="display:flex;gap:10px;align-items:center">
          <button class="btn-ghost" style="font-size:12px">✎ Edit Section</button>
          <button class="btn-outline" style="font-size:12px;padding:9px 18px">👁 Preview Full Document</button>
          <button onclick="${S.exporting?'':'openExport()'}" class="btn-cyan" style="padding:9px 20px;font-size:13px;${S.exporting?'opacity:0.8;cursor:default':''}">
            ${S.exporting?'<span class="spin">⟳</span> Exporting…':'↓ Export Word (.docx)'}
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

function exportModal(){
  const langs = [['EN','English'],['FR','French'],['NL','Dutch'],['DE','German'],['ES','Spanish'],['PT','Portuguese']];
  const canConfirm = S.exportLang !== null;
  return `
  <div class="disc-overlay" onclick="closeExport()">
    <div class="disc-box fadein" style="max-width:400px" onclick="stopOv(event)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <div style="font-size:15px;font-weight:700">Export Language</div>
        <button onclick="closeExport()" style="background:none;border:none;font-size:18px;color:#7E95A8;cursor:pointer;line-height:1">✕</button>
      </div>
      <p style="font-size:13px;color:#7E95A8;margin-bottom:18px">Select the language for the exported Word document.</p>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
        ${langs.map(([code,label])=>`
        <button data-lang-btn="${code}" onclick="setExportLang('${code}')" style="text-align:left;padding:10px 14px;border-radius:7px;border:1.5px solid ${S.exportLang===code?'#13B5CB':'#E2EBF3'};background:${S.exportLang===code?'#E8F8FC':'#fff'};color:${S.exportLang===code?'#0D9DB5':'#1B2B3C'};font-size:13px;font-weight:${S.exportLang===code?'700':'400'};cursor:pointer;display:flex;align-items:center;justify-content:space-between">
          <span>${label}</span>
          <span class="lang-check" style="font-size:14px;color:#13B5CB;display:${S.exportLang===code?'inline':'none'}">✓</span>
        </button>`).join('')}
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px">
        <button onclick="closeExport()" class="btn-ghost">Cancel</button>
        <button id="export-confirm-btn" onclick="${canConfirm?'confirmExport()':'void(0)'}" class="btn-cyan" style="opacity:${canConfirm?'1':'0.45'};cursor:${canConfirm?'pointer':'default'}" ${canConfirm?'':'disabled'}>
          Export →
        </button>
      </div>
    </div>
  </div>`;
}

function updateDocsModal(){
  return `
  <div class="disc-overlay" onclick="closeUpdateDocs()">
    <div class="disc-box fadein" style="max-width:480px" onclick="stopOv(event)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <div style="font-size:15px;font-weight:700">Update Documents</div>
        <button onclick="closeUpdateDocs()" style="background:none;border:none;font-size:18px;color:#7E95A8;cursor:pointer;line-height:1">✕</button>
      </div>
      <div style="background:#FEF8ED;border:1.5px solid #F5A623;border-radius:8px;padding:12px 14px;margin-bottom:18px;display:flex;gap:10px;align-items:flex-start;font-size:13px;color:#7D4A00;line-height:1.6">
        <span style="font-size:16px;flex-shrink:0">⚠</span>
        <span><strong>Authorization required:</strong> Only client tender documents that the client has authorized for processing using public cloud and AI services may be uploaded. If client authorization is missing or unclear, do not upload the document.</span>
      </div>
      <div style="border:2px dashed #D1DBE6;border-radius:10px;padding:20px 16px;text-align:center;background:#FAFBFC;margin-bottom:18px">
        <div style="font-size:22px;color:#13B5CB;margin-bottom:6px">⬆</div>
        <div style="font-size:13px;font-weight:600;margin-bottom:4px">Drag and drop updated documents</div>
        <div style="font-size:12px;color:#7E95A8;margin-bottom:12px">PDF and DOCX supported</div>
        <button class="btn-ghost" style="font-size:12px;padding:7px 18px">Browse Files</button>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px">
        <button onclick="closeUpdateDocs()" class="btn-ghost">Cancel</button>
        <button onclick="confirmUpdateDocs()" class="btn-cyan">Confirm & Go to Upload →</button>
      </div>
    </div>
  </div>`;
}

document.getElementById('app').innerHTML = buildApp();
</script>
</body>
